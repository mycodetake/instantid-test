name: Kaggle InstantID Test

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-kaggle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Kaggle CLI
        run: |
          pip install kaggle

      - name: Verify Secrets are Available
        run: |
          echo "检查 Secrets 是否存在..."
          if [ -z "${{ secrets.KAGGLE_USERNAME }}" ]; then
            echo "❌ KAGGLE_USERNAME 未设置"
            exit 1
          fi
          if [ -z "${{ secrets.KAGGLE_KEY }}" ]; then
            echo "❌ KAGGLE_KEY 未设置"
            exit 1
          fi
          echo "✅ Secrets 已正确设置"

      - name: Setup Kaggle Credentials
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          mkdir -p ~/.kaggle
          echo "{\"username\":\"${KAGGLE_USERNAME}\",\"key\":\"${KAGGLE_KEY}\"}" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json
          echo "✅ Kaggle 配置文件已创建"

      - name: Test Kaggle API Connection
        run: |
          echo "测试 Kaggle API 连接..."
          kaggle competitions list | head -5
          echo "✅ Kaggle API 连接成功"

      - name: Push Kernel to Kaggle
        run: |
          echo "推送 Kernel 到 Kaggle..."
          kaggle kernels push -p . 2>&1 | tee kaggle_push.log
          echo "✅ Kernel 推送完成"

      - name: Get Kernel Status
        if: always()
        run: |
          echo "获取 Kernel 状态..."
          kaggle kernels status $(cat kernel-metadata.json | grep '"id"' | cut -d'"' -f4) 2>&1 | tee kaggle_status.log || true

      - name: Save logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kaggle-logs-${{ github.run_number }}
          path: |
            *.log
            kaggle_*.log